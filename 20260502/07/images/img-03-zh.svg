<svg xmlns="http://www.w3.org/2000/svg" width="1384" height="776" viewBox="0 0 1384 776">
  <defs>
    <style>
      .bg{fill:#11111a}.panel{fill:#171721;stroke:#292a3a;stroke-width:2}.txt{font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif;font-weight:700}.mono{font-family:"SFMono-Regular","Consolas",monospace}.title{font-size:23px;letter-spacing:8px;fill:#62635f}.boxTitle{font-size:24px;letter-spacing:6px}.item{font-size:25px;fill:#a8a7a1}.mark{font-size:26px;font-weight:900}.rule{stroke:#34343f;stroke-width:2}
    </style>
  </defs>
  <rect width="1384" height="776" class="bg"/>
  <rect x="14" y="15" width="1356" height="746" rx="24" class="panel"/>
  <text x="56" y="66" class="txt mono title">之前 VS 之后</text>

  <rect x="64" y="136" width="614" height="568" rx="18" fill="#221920" stroke="#4c2630" stroke-width="2"/>
  <text x="98" y="203" class="txt mono boxTitle" fill="#ff6f75">之前</text>
  <line x1="98" y1="236" x2="645" y2="236" class="rule"/>
  <text x="96" y="298" class="txt mark" fill="#ff6f75">✕</text><text x="130" y="299" class="txt item">每天 47 分钟重复上下文</text>
  <text x="96" y="364" class="txt mark" fill="#ff6f75">✕</text><text x="130" y="365" class="txt item">每次会话都输入同样提示词</text>
  <text x="96" y="430" class="txt mark" fill="#ff6f75">✕</text><text x="130" y="431" class="txt item">手动代码 review</text>
  <text x="96" y="496" class="txt mark" fill="#ff6f75">✕</text><text x="130" y="497" class="txt item">手动编写测试</text>
  <text x="96" y="562" class="txt mark" fill="#ff6f75">✕</text><text x="130" y="563" class="txt item">一次只能做一个任务</text>
  <text x="96" y="628" class="txt mark" fill="#ff6f75">✕</text><text x="130" y="629" class="txt item">睡觉时没有任何产出</text>

  <rect x="710" y="136" width="614" height="568" rx="18" fill="#1b2222" stroke="#31564e" stroke-width="2"/>
  <text x="744" y="203" class="txt mono boxTitle" fill="#74d7b8">之后</text>
  <line x1="744" y1="236" x2="1291" y2="236" class="rule"/>
  <text x="744" y="298" class="txt mark" fill="#74d7b8">✓</text><text x="778" y="299" class="txt item">不再重复上下文</text>
  <text x="744" y="364" class="txt mark" fill="#74d7b8">✓</text><text x="778" y="365" class="txt item">记忆每天复利积累</text>
  <text x="744" y="430" class="txt mark" fill="#74d7b8">✓</text><text x="778" y="431" class="txt item">自动化安全 review</text>
  <text x="744" y="496" class="txt mark" fill="#74d7b8">✓</text><text x="778" y="497" class="txt item">默认强制 TDD</text>
  <text x="744" y="562" class="txt mark" fill="#74d7b8">✓</text><text x="778" y="563" class="txt item">5 个 agent 并行工作</text>
  <text x="744" y="628" class="txt mark" fill="#74d7b8">✓</text><text x="778" y="629" class="txt item">每天早上 PR 已经就绪</text>
</svg>
