<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">直接连接示意图</title>
  <desc id="desc">你的电脑直接连接到目标网站。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10.5" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M1 1 L11 6 L1 11 Z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1200" height="520" fill="#f8fafc"/>
  <path d="M0 420 C170 360 255 455 420 400 C600 340 735 368 900 325 C1035 290 1110 310 1200 270 L1200 520 L0 520 Z" fill="#e0f2fe" opacity="0.58"/>
  <text x="80" y="84" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC','PingFang SC',Arial,sans-serif" font-size="34" font-weight="700" fill="#0f172a">正常访问：直接连接</text>
  <text x="80" y="125" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC','PingFang SC',Arial,sans-serif" font-size="18" fill="#475569">请求从本机直接发往目标网站，中间没有代理服务器。</text>

  <g transform="translate(112 192)" filter="url(#shadow)">
    <rect x="0" y="0" width="236" height="176" rx="18" fill="#ffffff" stroke="#dbeafe" stroke-width="2"/>
    <rect x="52" y="36" width="132" height="82" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
    <rect x="88" y="128" width="60" height="16" rx="4" fill="#2563eb"/>
    <rect x="67" y="146" width="102" height="10" rx="5" fill="#93c5fd"/>
    <text x="118" y="210" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC','PingFang SC',Arial,sans-serif" font-size="28" font-weight="700" fill="#0f172a">你的电脑</text>
  </g>

  <g transform="translate(852 192)" filter="url(#shadow)">
    <rect x="0" y="0" width="236" height="176" rx="18" fill="#ffffff" stroke="#dcfce7" stroke-width="2"/>
    <circle cx="118" cy="84" r="54" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
    <path d="M64 84 H172 M118 30 C96 56 96 112 118 138 M118 30 C140 56 140 112 118 138 M74 54 C100 68 136 68 162 54 M74 114 C100 100 136 100 162 114" fill="none" stroke="#16a34a" stroke-width="4" stroke-linecap="round"/>
    <text x="118" y="210" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC','PingFang SC',Arial,sans-serif" font-size="28" font-weight="700" fill="#0f172a">目标网站</text>
  </g>

  <path d="M380 278 C505 220 682 220 810 278" fill="none" stroke="#2563eb" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="489" y="204" width="222" height="54" rx="27" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="600" y="239" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC','PingFang SC',Arial,sans-serif" font-size="22" font-weight="700" fill="#1d4ed8">直接连接</text>
</svg>
