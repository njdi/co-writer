<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">代理连接示意图</title>
  <desc id="desc">你的电脑先连接代理服务器，再由代理服务器访问目标网站。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <marker id="blueArrow" viewBox="0 0 12 12" refX="10.5" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M1 1 L11 6 L1 11 Z" fill="#2563eb"/>
    </marker>
    <marker id="greenArrow" viewBox="0 0 12 12" refX="10.5" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M1 1 L11 6 L1 11 Z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="1200" height="520" fill="#f8fafc"/>
  <path d="M0 66 C178 126 264 72 418 92 C596 116 696 192 878 158 C1008 134 1118 92 1200 122 L1200 0 L0 0 Z" fill="#ede9fe" opacity="0.62"/>
  <text x="70" y="84" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC','PingFang SC',Arial,sans-serif" font-size="34" font-weight="700" fill="#0f172a">代理访问：中间多一台转发服务器</text>
  <text x="70" y="125" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC','PingFang SC',Arial,sans-serif" font-size="18" fill="#475569">目标网站看到的是代理服务器的出口地址，而不是你的真实地址。</text>

  <g transform="translate(64 212)" filter="url(#shadow)">
    <rect x="0" y="0" width="216" height="152" rx="18" fill="#ffffff" stroke="#dbeafe" stroke-width="2"/>
    <rect x="49" y="34" width="118" height="72" rx="9" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
    <rect x="82" y="116" width="52" height="14" rx="4" fill="#2563eb"/>
    <rect x="62" y="132" width="92" height="9" rx="4.5" fill="#93c5fd"/>
    <text x="108" y="195" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC','PingFang SC',Arial,sans-serif" font-size="26" font-weight="700" fill="#0f172a">你的电脑</text>
  </g>

  <g transform="translate(492 212)" filter="url(#shadow)">
    <rect x="0" y="0" width="216" height="152" rx="18" fill="#ffffff" stroke="#fed7aa" stroke-width="2"/>
    <rect x="52" y="30" width="112" height="92" rx="12" fill="#ffedd5" stroke="#f97316" stroke-width="4"/>
    <line x1="75" y1="56" x2="141" y2="56" stroke="#f97316" stroke-width="5" stroke-linecap="round"/>
    <line x1="75" y1="78" x2="141" y2="78" stroke="#f97316" stroke-width="5" stroke-linecap="round"/>
    <line x1="75" y1="100" x2="118" y2="100" stroke="#f97316" stroke-width="5" stroke-linecap="round"/>
    <text x="108" y="195" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC','PingFang SC',Arial,sans-serif" font-size="26" font-weight="700" fill="#0f172a">代理服务器</text>
    <text x="108" y="224" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC','PingFang SC',Arial,sans-serif" font-size="17" fill="#9a3412">帮你跑腿</text>
  </g>

  <g transform="translate(920 212)" filter="url(#shadow)">
    <rect x="0" y="0" width="216" height="152" rx="18" fill="#ffffff" stroke="#dcfce7" stroke-width="2"/>
    <circle cx="108" cy="76" r="48" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
    <path d="M60 76 H156 M108 28 C88 52 88 100 108 124 M108 28 C128 52 128 100 108 124 M69 50 C92 62 124 62 147 50 M69 102 C92 90 124 90 147 102" fill="none" stroke="#16a34a" stroke-width="4" stroke-linecap="round"/>
    <text x="108" y="195" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC','PingFang SC',Arial,sans-serif" font-size="26" font-weight="700" fill="#0f172a">目标网站</text>
  </g>

  <path d="M302 288 H454" fill="none" stroke="#2563eb" stroke-width="8" stroke-linecap="round" marker-end="url(#blueArrow)"/>
  <path d="M730 288 H882" fill="none" stroke="#16a34a" stroke-width="8" stroke-linecap="round" marker-end="url(#greenArrow)"/>
  <text x="378" y="256" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC','PingFang SC',Arial,sans-serif" font-size="18" font-weight="700" fill="#1d4ed8">先发给代理</text>
  <text x="806" y="256" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC','PingFang SC',Arial,sans-serif" font-size="18" font-weight="700" fill="#15803d">代理再访问</text>
</svg>
