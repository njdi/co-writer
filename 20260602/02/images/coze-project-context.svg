<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">扣子 3.0 项目协作结构</title>
  <desc id="desc">一个项目里，多个人、多个 Agent、资料、过程和结果围绕共同上下文协作。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity=".14"/>
    </filter>
    <linearGradient id="centerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="28" fill="#f8fafc"/>
  <text x="600" y="68" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="34" font-weight="700" fill="#0f172a">扣子 3.0：把 AI 放进项目里协作</text>
  <text x="600" y="106" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" fill="#475569">不是多个孤立聊天窗口，而是同一个项目上下文里的分工接力</text>

  <rect x="383" y="188" width="434" height="270" rx="28" fill="url(#centerGrad)" filter="url(#shadow)"/>
  <text x="600" y="258" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="700" fill="#ffffff">项目</text>
  <text x="600" y="298" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" fill="#e0f2fe">共同上下文</text>
  <text x="600" y="344" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="19" fill="#ffffff">目标 · 资料 · 讨论过程 · 阶段产出</text>
  <text x="600" y="388" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="19" fill="#ffffff">人和 Agent 都围绕同一件事推进</text>

  <g font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
    <rect x="72" y="168" width="276" height="126" rx="20" fill="#ffffff" stroke="#dbeafe" stroke-width="2" filter="url(#shadow)"/>
    <circle cx="132" cy="222" r="24" fill="#dbeafe"/>
    <path d="M119 222a13 13 0 1 0 26 0a13 13 0 1 0 -26 0M108 258c10-20 54-20 64 0" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
    <text x="198" y="210" font-size="22" font-weight="700" fill="#0f172a">多人</text>
    <text x="198" y="238" font-size="16" fill="#475569">提需求、补资料</text>
    <text x="198" y="264" font-size="16" fill="#475569">审结果</text>

    <rect x="852" y="168" width="276" height="126" rx="20" fill="#ffffff" stroke="#ccfbf1" stroke-width="2" filter="url(#shadow)"/>
    <rect x="912" y="201" width="48" height="48" rx="14" fill="#ccfbf1"/>
    <circle cx="929" cy="224" r="4" fill="#0f766e"/>
    <circle cx="943" cy="224" r="4" fill="#0f766e"/>
    <path d="M924 240h24" stroke="#0f766e" stroke-width="4" stroke-linecap="round"/>
    <text x="996" y="210" font-size="22" font-weight="700" fill="#0f172a">多 Agent</text>
    <text x="996" y="238" font-size="16" fill="#475569">调研、写作</text>
    <text x="996" y="264" font-size="16" fill="#475569">分析、开发</text>

    <rect x="72" y="438" width="276" height="126" rx="20" fill="#ffffff" stroke="#fde68a" stroke-width="2" filter="url(#shadow)"/>
    <path d="M112 478h58v42h-58z" fill="#fef3c7" stroke="#d97706" stroke-width="4"/>
    <path d="M126 492h32M126 506h24" stroke="#d97706" stroke-width="4" stroke-linecap="round"/>
    <text x="198" y="480" font-size="22" font-weight="700" fill="#0f172a">资料</text>
    <text x="198" y="508" font-size="16" fill="#475569">文档、文件</text>
    <text x="198" y="534" font-size="16" fill="#475569">链接、素材</text>

    <rect x="852" y="438" width="276" height="126" rx="20" fill="#ffffff" stroke="#e9d5ff" stroke-width="2" filter="url(#shadow)"/>
    <path d="M916 472h58v52h-58z" fill="#f3e8ff" stroke="#7c3aed" stroke-width="4" rx="8"/>
    <path d="M930 491h30M930 508h24" stroke="#7c3aed" stroke-width="4" stroke-linecap="round"/>
    <text x="996" y="480" font-size="22" font-weight="700" fill="#0f172a">结果</text>
    <text x="996" y="508" font-size="16" fill="#475569">草稿、方案</text>
    <text x="996" y="534" font-size="16" fill="#475569">代码、清单</text>
  </g>

  <path d="M348 231 C365 231 375 238 383 250" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <path d="M852 231 C835 231 825 238 817 250" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <path d="M348 501 C365 501 375 488 383 420" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <path d="M852 501 C835 501 825 488 817 420" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>

  <rect x="250" y="616" width="700" height="48" rx="24" fill="#e2e8f0"/>
  <text x="600" y="648" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700" fill="#334155">关键理解：项目把上下文装起来，让人和多个 Agent 接得上</text>
</svg>
