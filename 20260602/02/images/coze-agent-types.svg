<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">扣子 3.0 三类 Agent</title>
  <desc id="desc">Coze Agent、云端 Agent、本地 Agent 三类 Agent 的区别和适用场景。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="1200" height="680" rx="28" fill="#f8fafc"/>
  <text x="600" y="70" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="34" font-weight="700" fill="#0f172a">三类 Agent：运行方式和配置深度不同</text>
  <text x="600" y="108" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" fill="#475569">可以把它们理解成进入同一个项目的三种 AI 成员</text>

  <g font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
    <rect x="88" y="164" width="320" height="374" rx="24" fill="#ffffff" stroke="#dbeafe" stroke-width="2" filter="url(#shadow)"/>
    <circle cx="248" cy="238" r="48" fill="#dbeafe"/>
    <rect x="218" y="211" width="60" height="60" rx="16" fill="#2563eb"/>
    <circle cx="239" cy="240" r="5" fill="#ffffff"/>
    <circle cx="260" cy="240" r="5" fill="#ffffff"/>
    <path d="M234 257h32" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    <text x="248" y="322" text-anchor="middle" font-size="28" font-weight="700" fill="#0f172a">Coze Agent</text>
    <text x="248" y="358" text-anchor="middle" font-size="19" fill="#334155">扣子原生标准助手</text>
    <text x="248" y="392" text-anchor="middle" font-size="19" fill="#334155">可配角色、模型、技能</text>
    <text x="248" y="426" text-anchor="middle" font-size="19" fill="#334155">不用管理运行环境</text>
    <rect x="137" y="474" width="222" height="44" rx="22" fill="#eff6ff"/>
    <text x="248" y="503" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">门槛低，打开就能用</text>

    <rect x="440" y="164" width="320" height="374" rx="24" fill="#ffffff" stroke="#ccfbf1" stroke-width="2" filter="url(#shadow)"/>
    <circle cx="600" cy="238" r="48" fill="#ccfbf1"/>
    <path d="M565 246c6-21 22-32 43-27c12-18 43-9 44 14c17 2 28 14 28 31c0 19-15 32-36 32h-77c-21 0-36-13-36-32c0-15 11-27 24-28z" fill="#0f766e"/>
    <text x="600" y="322" text-anchor="middle" font-size="28" font-weight="700" fill="#0f172a">云端 Agent</text>
    <text x="600" y="358" text-anchor="middle" font-size="19" fill="#334155">运行在云端工作环境</text>
    <text x="600" y="392" text-anchor="middle" font-size="19" fill="#334155">可按任务配置能力</text>
    <text x="600" y="426" text-anchor="middle" font-size="19" fill="#334155">适合长期在线和持续任务</text>
    <rect x="489" y="474" width="222" height="44" rx="22" fill="#ecfeff"/>
    <text x="600" y="503" text-anchor="middle" font-size="18" font-weight="700" fill="#0f766e">像带环境的远程成员</text>

    <rect x="792" y="164" width="320" height="374" rx="24" fill="#ffffff" stroke="#fde68a" stroke-width="2" filter="url(#shadow)"/>
    <circle cx="952" cy="238" r="48" fill="#fef3c7"/>
    <rect x="913" y="213" width="78" height="52" rx="10" fill="#d97706"/>
    <rect x="924" y="224" width="56" height="30" rx="4" fill="#fff7ed"/>
    <path d="M932 281h40M944 265v16M960 265v16" stroke="#d97706" stroke-width="6" stroke-linecap="round"/>
    <text x="952" y="322" text-anchor="middle" font-size="28" font-weight="700" fill="#0f172a">本地 Agent</text>
    <text x="952" y="358" text-anchor="middle" font-size="19" fill="#334155">运行在你的电脑附近</text>
    <text x="952" y="392" text-anchor="middle" font-size="19" fill="#334155">接入本地文件、代码和工具</text>
    <text x="952" y="426" text-anchor="middle" font-size="19" fill="#334155">适合开发、文件处理等场景</text>
    <rect x="841" y="474" width="222" height="44" rx="22" fill="#fff7ed"/>
    <text x="952" y="503" text-anchor="middle" font-size="18" font-weight="700" fill="#b45309">离真实工作更近</text>
  </g>

  <rect x="220" y="586" width="760" height="46" rx="23" fill="#e2e8f0"/>
  <text x="600" y="616" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700" fill="#334155">Coze Agent 更标准，云端 Agent 更可配置，本地 Agent 更贴近你的电脑</text>
</svg>
