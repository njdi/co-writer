<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">扣子 3.0 三端同步</title>
  <desc id="desc">网页端、桌面端、手机端围绕同一个项目同步推进。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity=".13"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="680" rx="28" fill="#f8fafc"/>
  <text x="600" y="70" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="34" font-weight="700" fill="#0f172a">三端同步：同一个项目，换设备也能继续</text>
  <text x="600" y="108" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" fill="#475569">重点不是多了入口，而是项目不会被设备打断</text>

  <g font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
    <rect x="412" y="210" width="376" height="178" rx="28" fill="#ffffff" stroke="#dbeafe" stroke-width="2" filter="url(#shadow)"/>
    <text x="600" y="270" text-anchor="middle" font-size="30" font-weight="700" fill="#0f172a">同一个项目</text>
    <text x="600" y="314" text-anchor="middle" font-size="20" fill="#475569">目标 · 资料 · Agent · 过程 · 结果</text>
    <rect x="512" y="340" width="176" height="38" rx="19" fill="#eff6ff"/>
    <text x="600" y="365" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8">持续同步</text>

    <rect x="88" y="176" width="238" height="174" rx="22" fill="#ffffff" stroke="#ccfbf1" stroke-width="2" filter="url(#shadow)"/>
    <rect x="134" y="216" width="146" height="88" rx="10" fill="#0f766e"/>
    <rect x="145" y="228" width="124" height="58" rx="6" fill="#ecfeff"/>
    <path d="M176 315h62M191 305v10M223 305v10" stroke="#0f766e" stroke-width="6" stroke-linecap="round"/>
    <text x="207" y="392" text-anchor="middle" font-size="25" font-weight="700" fill="#0f172a">网页端</text>
    <text x="207" y="426" text-anchor="middle" font-size="18" fill="#475569">快速访问，补充想法</text>

    <rect x="874" y="176" width="238" height="174" rx="22" fill="#ffffff" stroke="#fde68a" stroke-width="2" filter="url(#shadow)"/>
    <rect x="922" y="212" width="142" height="88" rx="10" fill="#d97706"/>
    <rect x="934" y="224" width="118" height="58" rx="6" fill="#fff7ed"/>
    <path d="M951 246h70M951 263h48" stroke="#d97706" stroke-width="5" stroke-linecap="round"/>
    <path d="M960 316h66M976 300v16M1010 300v16" stroke="#d97706" stroke-width="6" stroke-linecap="round"/>
    <text x="993" y="392" text-anchor="middle" font-size="25" font-weight="700" fill="#0f172a">桌面端</text>
    <text x="993" y="426" text-anchor="middle" font-size="18" fill="#475569">文件、代码、本地工具</text>

    <rect x="438" y="472" width="224" height="126" rx="22" fill="#ffffff" stroke="#e9d5ff" stroke-width="2" filter="url(#shadow)"/>
    <rect x="508" y="493" width="52" height="78" rx="12" fill="#7c3aed"/>
    <rect x="515" y="505" width="38" height="50" rx="5" fill="#f3e8ff"/>
    <circle cx="534" cy="562" r="4" fill="#f3e8ff"/>
    <text x="550" y="625" text-anchor="middle" font-size="25" font-weight="700" fill="#0f172a">手机端</text>
    <text x="550" y="653" text-anchor="middle" font-size="18" fill="#475569">随时查看，随时推进</text>
  </g>

  <path d="M326 266 C370 260 388 260 412 272" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M788 272 C814 260 836 260 874 266" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M564 472 C570 430 580 406 594 388" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M616 388 C632 408 644 432 650 472" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
